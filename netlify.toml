[build]
  command = "npm run build"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/blog/news/:slug"
  to = "/news/:slug"
  status = 200

[[redirects]]
  from = "/blog/news/*"
  to = "/news/:splat"
  status = 200

[[redirects]]
  from = "/blog/*"
  to = "/:splat"
  status = 200
